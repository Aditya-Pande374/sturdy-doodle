<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D-Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-cont">
        <canvas id="canvas">
        </canvas>
        <div class="main-screen">
            <h1 class="name">ADITYA PANDE</h1>
            <h2 class="my-role"><i class="fa-solid fa-minus"></i> Web Developer</h2>
            <div class="keys">
                <div class="key-12">
                    <div class="key-1"><i class="fa-solid fa-arrow-left"></i></div>
                    <div class="key-2"><i class="fa-solid fa-arrow-up"></i></div>
                    <div class="key-3"><i class="fa-solid fa-arrow-right"></i></div>
                </div>
                <div class="instructions">
                    Use the Arrow Keys for controlling the character!
                    <div>
                        1. Press Left to go left
                    </div>
                    <div>
                        2. Press Right to go right
                    </div>
                    <div>
                        3. Press Up to Jump/Fly
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/031ed58609.js" crossorigin="anonymous"></script>
</body>
</html>
