<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D-Platformer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-cont">
      <canvas id="canvas"> </canvas>

      <div class="main-screen">
        <h1 class="name">ADITYA PANDE</h1>
        <h2 class="my-role"><i class="fa-solid fa-minus"></i> Web Developer</h2>
        <div class="keys">
          <!-- JUMP -->
          <div class="key-123">
            <div class="kbrd-key key-1"></div>
            <div class="kbrd-key key-2">
              <i class="arrow fa-solid fa-arrow-up"></i>
              <div class="jump">JUMP</div>
            </div>
            <div class="kbrd-key key-3"></div>
          </div>

          <!-- LEFT RIGHT -->
          <div class="key-456">
            <div class="kbrd-key key-4">
              <i class="arrow fa-solid fa-arrow-left"></i>
              <div class="go-left">LEFT</div>
            </div>
            <div class="kbrd-key key-5">
              <i class="arrow fa-solid fa-arrow-right"></i>
              <div class="go-right">RIGHT</div>
            </div>
          </div>
        </div>

        <div class="instructions">
          Tip: Head over to each of the red-coloured computer screens!
        </div>
      </div>

          <div>E</div>

      </div>

      <div class="contact-me">
        
          <div>C</div>

          <div>N</div>
          <div>T</div>
          <div>A</div>

    </div>
